<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimización de Riego — ADA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ═══ Top Bar ═══ -->
    <header class="topbar">
        <div class="topbar-left">
            <span class="logo-icon">🌊</span>
            <h1>Optimización de Riego</h1>
            <span class="badge">ADA</span>
        </div>
        <div class="topbar-right">
            <button class="btn btn-ghost" id="btnStatus" title="Estado del servidor">
                <span class="dot dot-green"></span> En línea
            </button>
        </div>
    </header>

    <!-- ═══ Main Layout ═══ -->
    <main class="main-grid">

        <!-- ─── Left Column: Data ─── -->
        <section class="card panel-data">
            <div class="card-header">
                <h2>📊 Datos</h2>
                <label class="btn btn-primary" id="btnLoadLabel">
                    📁 Cargar archivo
                    <input type="file" id="fileInput" accept=".txt" hidden>
                </label>
            </div>

            <div class="card-body">
                <!-- Empty state -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📄</div>
                    <p>Cargá un archivo <code>.txt</code><br>con los datos de la finca</p>
                    <p class="hint">Formato: <code>n</code> en primera línea,<br>
                    <code>ts,tr,p,rp</code> en las siguientes</p>
                </div>

                <!-- Table -->
                <div class="table-wrap" id="tableWrap" style="display:none">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>ts</th>
                                <th>tr</th>
                                <th>p</th>
                                <th>rp</th>
                            </tr>
                        </thead>
                        <tbody id="dataBody"></tbody>
                    </table>
                </div>

                <div class="file-info" id="fileInfo" style="display:none">
                    <span id="fileInfoText"></span>
                </div>
            </div>
        </section>

        <!-- ─── Right Column: Results ─── -->
        <section class="card panel-results">
            <div class="card-header">
                <h2>📈 Resultados</h2>
                <div class="btn-group">
                    <button class="btn btn-accent" data-algo="fb">FB</button>
                    <button class="btn btn-accent" data-algo="voraz">Voraz</button>
                    <button class="btn btn-accent" data-algo="pd">PD</button>
                    <button class="btn btn-accent" data-algo="todos">Todos</button>
                </div>
            </div>

            <div class="card-body results-body" id="resultsBody">
                <div class="empty-state" id="resultsEmpty">
                    <div class="empty-icon">📈</div>
                    <p>Ejecutá un algoritmo para ver los resultados</p>
                </div>

                <!-- Dynamic results will be injected here -->
                <div id="resultsContainer"></div>
            </div>

            <!-- Actions bar (sticky at bottom of card) -->
            <div class="card-actions" id="cardActions" style="display:none">
                <button class="btn btn-secondary" id="btnVerify">🔍 Verificar paso a paso</button>
                <button class="btn btn-secondary" id="btnDownload">💾 Descargar resultado</button>
                <button class="btn btn-danger" id="btnClear">🗑️ Limpiar</button>
            </div>
        </section>

    </main>

    <!-- ═══ Status Bar ═══ -->
    <footer class="statusbar" id="statusBar">
        <span class="status-msg" id="statusMsg">💡 Cargá un archivo para comenzar</span>
        <span class="status-timer" id="statusTimer"></span>
    </footer>

    <!-- ═══ Verification Modal ═══ -->
    <div class="modal-overlay" id="verifyModal" style="display:none">
        <div class="modal">
            <div class="modal-header">
                <h2>🔍 Verificación paso a paso</h2>
                <button class="btn btn-ghost modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Step-by-step will be rendered here -->
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="modalCloseBtn">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
